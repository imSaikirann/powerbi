<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <defs>
    <style>
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #12344d; }
      .subtitle { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #486581; }
      .step { stroke: #12344d; stroke-width: 2.5; rx: 20; ry: 20; }
      .head { font: 700 22px 'Segoe UI', Arial, sans-serif; fill: #102a43; }
      .body { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #243b53; }
      .arrow { stroke: #12344d; stroke-width: 4; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#12344d"/>
    </marker>
  </defs>

  <rect width="1600" height="980" fill="#f7fafc"/>
  <text x="800" y="58" text-anchor="middle" class="title">HR Analytics Dashboard Data Flow</text>
  <text x="800" y="90" text-anchor="middle" class="subtitle">How data moves through generation, cleaning, modeling, service, and reporting</text>

  <rect x="110" y="150" width="280" height="125" class="step" fill="#d9f3e4"/>
  <text x="250" y="192" text-anchor="middle" class="head">Step 1: Generate Raw Data</text>
  <text x="250" y="225" text-anchor="middle" class="body">Create 6,000 synthetic employee</text>
  <text x="250" y="249" text-anchor="middle" class="body">records with realistic relationships</text>

  <rect x="490" y="150" width="280" height="125" class="step" fill="#fff4cc"/>
  <text x="630" y="192" text-anchor="middle" class="head">Step 2: Inject Quality Issues</text>
  <text x="630" y="225" text-anchor="middle" class="body">Add duplicates, null values,</text>
  <text x="630" y="249" text-anchor="middle" class="body">and inconsistent text labels</text>

  <rect x="870" y="150" width="280" height="125" class="step" fill="#d8ecff"/>
  <text x="1010" y="192" text-anchor="middle" class="head">Step 3: Clean and Enrich</text>
  <text x="1010" y="225" text-anchor="middle" class="body">Standardize fields, impute values,</text>
  <text x="1010" y="249" text-anchor="middle" class="body">derive tenure and reporting columns</text>

  <rect x="1250" y="150" width="240" height="125" class="step" fill="#fde2e4"/>
  <text x="1370" y="192" text-anchor="middle" class="head">Step 4: Save Outputs</text>
  <text x="1370" y="225" text-anchor="middle" class="body">Clean CSV and quality report</text>
  <text x="1370" y="249" text-anchor="middle" class="body">become downstream inputs</text>

  <rect x="200" y="400" width="310" height="130" class="step" fill="#fce38a"/>
  <text x="355" y="442" text-anchor="middle" class="head">Step 5: Prepare ML Features</text>
  <text x="355" y="475" text-anchor="middle" class="body">Select age, gender, department, role,</text>
  <text x="355" y="499" text-anchor="middle" class="body">salary, attendance, performance, tenure</text>

  <rect x="645" y="400" width="310" height="130" class="step" fill="#eadcff"/>
  <text x="800" y="442" text-anchor="middle" class="head">Step 6: Train Logistic Regression</text>
  <text x="800" y="475" text-anchor="middle" class="body">ColumnTransformer preprocessing,</text>
  <text x="800" y="499" text-anchor="middle" class="body">stratified split, probability output</text>

  <rect x="1090" y="400" width="310" height="130" class="step" fill="#ffd6ba"/>
  <text x="1245" y="442" text-anchor="middle" class="head">Step 7: Evaluate Model</text>
  <text x="1245" y="475" text-anchor="middle" class="body">ROC-AUC, precision, recall,</text>
  <text x="1245" y="499" text-anchor="middle" class="body">F1-score, support counts</text>

  <rect x="300" y="665" width="310" height="130" class="step" fill="#c9f0ff"/>
  <text x="455" y="707" text-anchor="middle" class="head">Step 8: Build API Payloads</text>
  <text x="455" y="740" text-anchor="middle" class="body">Generate KPI summaries, charts,</text>
  <text x="455" y="764" text-anchor="middle" class="body">tables, and report structures</text>

  <rect x="760" y="665" width="310" height="130" class="step" fill="#ffe7c2"/>
  <text x="915" y="707" text-anchor="middle" class="head">Step 9: Render Dashboard</text>
  <text x="915" y="740" text-anchor="middle" class="body">Overview, Performance, Data Quality,</text>
  <text x="915" y="764" text-anchor="middle" class="body">and Final Output pages</text>

  <rect x="1220" y="665" width="250" height="130" class="step" fill="#e2ece9"/>
  <text x="1345" y="707" text-anchor="middle" class="head">Step 10: Review Output</text>
  <text x="1345" y="740" text-anchor="middle" class="body">Use results in report writing,</text>
  <text x="1345" y="764" text-anchor="middle" class="body">screenshots, and decisions</text>

  <path d="M 390 212 L 490 212" class="arrow"/>
  <path d="M 770 212 L 870 212" class="arrow"/>
  <path d="M 1150 212 L 1250 212" class="arrow"/>
  <path d="M 1370 275 L 1370 345 L 355 345 L 355 400" class="arrow"/>
  <path d="M 510 465 L 645 465" class="arrow"/>
  <path d="M 955 465 L 1090 465" class="arrow"/>
  <path d="M 1245 530 L 1245 600 L 455 600 L 455 665" class="arrow"/>
  <path d="M 610 730 L 760 730" class="arrow"/>
  <path d="M 1070 730 L 1220 730" class="arrow"/>
</svg>
